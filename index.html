<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Data with Spark & Dask on AWS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Design tokens */
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --green: #2ea043;
      --green-l: #3fb950;
      --tut: #3fb950;
      --blue: #388bfd;
      --howto: #388bfd;
      --purple: #a371f7;
      --expl: #a371f7;
      --amber: #d29922;
      --ref: #d29922;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Lora', serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--green-l);
    }

    .progress-bar {
      width: 200px;
      height: 6px;
      background-color: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progress-fill {
      height: 100%;
      background-color: var(--green-l);
      width: 0%;
      transition: width 0.3s ease;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.875rem;
      color: var(--text2);
    }

    .diataxis-tag {
      display: flex;
      gap: 0.5rem;
      margin-right: 1rem;
    }

    .tag-pill {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    .tag-tut { background-color: var(--tut); }
    .tag-howto { background-color: var(--howto); }
    .tag-expl { background-color: var(--expl); }
    .tag-ref { background-color: var(--ref); }

    /* Hero section */
    .hero {
      padding: 3rem 2rem;
      background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
      border-bottom: 1px solid var(--border);
    }

    .hero-content {
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .hero-meta {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
    }

    .meta-label {
      font-size: 0.875rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .meta-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
    }

    .diataxis-legend {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background-color: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.875rem;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .legend-dot-tut { background-color: var(--tut); }
    .legend-dot-howto { background-color: var(--howto); }
    .legend-dot-expl { background-color: var(--expl); }
    .legend-dot-ref { background-color: var(--ref); }

    /* Main container */
    .container {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      gap: 2rem;
      padding: 2rem;
      min-height: calc(100vh - 300px);
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
    }

    .phase-group {
      margin-bottom: 1.5rem;
    }

    .phase-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      background-color: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      user-select: none;
      transition: background-color 0.2s;
    }

    .phase-header:hover {
      background-color: var(--bg3);
    }

    .phase-toggle {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 0.875rem;
    }

    .phase-toggle.collapsed {
      transform: rotate(-90deg);
    }

    .phase-weeks {
      margin-top: 0.5rem;
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .phase-weeks.collapsed {
      max-height: 0;
    }

    .week-item {
      padding: 0.75rem 1rem;
      margin: 0.25rem 0;
      background-color: var(--bg3);
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      margin-left: 0.5rem;
      border-left: 3px solid transparent;
    }

    .week-item:hover {
      background-color: #262c34;
    }

    .week-item.active {
      background-color: var(--bg2);
      border-left-color: var(--green-l);
      border: 1px solid var(--border);
    }

    /* Content area */
    .content {
      flex: 1;
      min-width: 0;
    }

    .week-title {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .week-meta {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      color: var(--text2);
    }

    .week-meta-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .week-meta-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--text2);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .tab-button {
      padding: 1rem 1.5rem;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text2);
      transition: all 0.2s;
      margin-bottom: -1px;
    }

    .tab-button:hover {
      color: var(--text);
    }

    .tab-button.active {
      color: var(--text);
    }

    .tab-button.active.tut { border-bottom-color: var(--tut); }
    .tab-button.active.howto { border-bottom-color: var(--howto); }
    .tab-button.active.expl { border-bottom-color: var(--expl); }
    .tab-button.active.ref { border-bottom-color: var(--ref); }

    /* Tab content */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .diataxis-banner {
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .diataxis-banner.tut {
      background-color: rgba(63, 185, 80, 0.1);
      border-left: 4px solid var(--tut);
      color: var(--tut);
    }

    .diataxis-banner.howto {
      background-color: rgba(56, 139, 253, 0.1);
      border-left: 4px solid var(--howto);
      color: var(--howto);
    }

    .diataxis-banner.expl {
      background-color: rgba(163, 113, 247, 0.1);
      border-left: 4px solid var(--expl);
      color: var(--expl);
    }

    .diataxis-banner.ref {
      background-color: rgba(210, 153, 34, 0.1);
      border-left: 4px solid var(--ref);
      color: var(--ref);
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      margin: 1.5rem 0 1rem;
      color: var(--text);
    }

    .body-text {
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    /* Analogy box */
    .analogy-box {
      background-color: var(--bg2);
      border-left: 4px solid var(--blue);
      padding: 1.5rem;
      margin: 1.5rem 0;
      border-radius: 6px;
      display: flex;
      gap: 1rem;
    }

    .analogy-icon {
      font-size: 2rem;
      flex-shrink: 0;
    }

    .analogy-text {
      flex: 1;
    }

    .analogy-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .analogy-content {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
    }

    /* Concept box */
    .concept-box {
      background-color: rgba(46, 160, 67, 0.1);
      border: 1px solid rgba(46, 160, 67, 0.3);
      padding: 1.5rem;
      margin: 1.5rem 0;
      border-radius: 6px;
      border-left: 4px solid var(--green);
    }

    .concept-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      color: var(--green-l);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .concept-content {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
    }

    /* Steps */
    .steps {
      margin: 1.5rem 0;
    }

    .step {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .step-number {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background-color: var(--green);
      color: var(--bg);
      border-radius: 50%;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .step-content {
      flex: 1;
      padding-top: 0.25rem;
    }

    .step-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .step-body {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
    }

    /* Reference tables */
    .reference-table {
      margin: 1.5rem 0;
    }

    .table-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--text);
      font-size: 0.95rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    table th {
      background-color: var(--bg2);
      border: 1px solid var(--border);
      padding: 0.75rem;
      text-align: left;
      font-weight: 600;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
    }

    table td {
      background-color: var(--bg3);
      border: 1px solid var(--border);
      padding: 0.75rem;
      color: var(--text);
      word-break: break-word;
    }

    table td code {
      background-color: var(--bg);
      padding: 0.25rem 0.5rem;
      border-radius: 3px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text);
    }

    /* Code block */
    .code-section {
      margin: 1.5rem 0;
    }

    .code-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .code-wrapper {
      position: relative;
      background-color: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .code-copy-btn {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      padding: 0.5rem 1rem;
      background-color: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      transition: all 0.2s;
      z-index: 10;
    }

    .code-copy-btn:hover {
      background-color: var(--bg3);
      color: var(--text);
    }

    .code-copy-btn.copied {
      background-color: var(--green);
      color: var(--bg);
      border-color: var(--green);
    }

    pre {
      padding: 1.5rem 1.5rem 1.5rem 1.5rem;
      overflow-x: auto;
    }

    code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text);
    }

    /* Quiz section */
    .quiz-section {
      background-color: var(--bg2);
      border: 1px solid var(--border);
      padding: 1.5rem;
      border-radius: 6px;
      margin: 1.5rem 0;
    }

    .quiz-question {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .quiz-option {
      padding: 0.75rem 1rem;
      background-color: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .quiz-option:hover {
      background-color: var(--bg3);
      border-color: var(--blue);
    }

    .quiz-option input[type="radio"] {
      cursor: pointer;
    }

    .quiz-feedback {
      padding: 1rem;
      border-radius: 4px;
      margin-top: 1rem;
      font-size: 0.9rem;
      display: none;
    }

    .quiz-feedback.shown {
      display: block;
    }

    .quiz-feedback.correct {
      background-color: rgba(46, 160, 67, 0.1);
      border-left: 4px solid var(--green);
      color: var(--green-l);
    }

    .quiz-feedback.incorrect {
      background-color: rgba(248, 81, 73, 0.1);
      border-left: 4px solid #f85149;
      color: #f85149;
    }

    /* Mark complete button */
    .mark-complete-btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background-color: var(--green);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .mark-complete-btn:hover {
      background-color: var(--green-l);
    }

    .mark-complete-btn.completed {
      background-color: transparent;
      color: var(--green-l);
      border: 2px solid var(--green-l);
    }

    /* Coming soon placeholder */
    .coming-soon {
      padding: 3rem 2rem;
      text-align: center;
      background-color: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text2);
    }

    .coming-soon-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    /* Footer */
    footer {
      background-color: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      color: var(--text2);
      font-size: 0.9rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        gap: 1rem;
      }

      .sidebar {
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .phase-group {
        flex: 1;
        min-width: 200px;
        margin-bottom: 0;
      }

      .hero h1 {
        font-size: 1.75rem;
      }

      .hero-meta {
        flex-direction: column;
        gap: 1rem;
      }

      .tabs {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-left">
    <div class="logo">big-data-course</div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>
  <div class="header-right">
    <span id="progress-text">0 / 48</span>
    <span style="color: var(--text2);">|</span>
    <div class="diataxis-tag">
      <span class="tag-pill tag-tut" title="Tutorial"></span>
      <span class="tag-pill tag-howto" title="How-to"></span>
      <span class="tag-pill tag-expl" title="Explanation"></span>
      <span class="tag-pill tag-ref" title="Reference"></span>
    </div>
    <span style="color: var(--text2);">Diátaxis · 2026</span>
  </div>
</header>

<!-- Hero -->
<section class="hero">
  <div class="hero-content">
    <h1>Big Data with Spark & Dask on AWS</h1>
    <div class="hero-meta">
      <div class="meta-item">
        <span class="meta-label">Lessons</span>
        <span class="meta-value">48</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Weeks</span>
        <span class="meta-value">12</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Duration</span>
        <span class="meta-value">~50 hours</span>
      </div>
    </div>
    <div class="diataxis-legend">
      <div class="legend-item">
        <span class="legend-dot legend-dot-tut"></span>
        <span>Tutorial: Learn by doing</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot legend-dot-howto"></span>
        <span>How-to: Task-oriented</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot legend-dot-expl"></span>
        <span>Explanation: Deep dive</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot legend-dot-ref"></span>
        <span>Reference: Documentation</span>
      </div>
    </div>
  </div>
</section>

<!-- Main container -->
<div class="container">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Content -->
  <main class="content">
    <div id="week-header"></div>
    <div id="tabs"></div>
    <div id="content-area"></div>
    <button class="mark-complete-btn" id="mark-complete-btn">Mark Complete</button>
  </main>
</div>

<!-- Footer -->
<footer>
  <p>&copy; 2026 Big Data Course. Built with Diátaxis principles.</p>
</footer>

<script>
// ============================================
// Data Structure
// ============================================

const weeks = [
  {
    id: 1,
    title: 'Environment Setup & Big Data Concepts',
    phase: 1,
    phaseName: 'Foundations',
    dataset: 'NYC Yellow Taxi (sample)',
    tabs: {
      tut: {
        title: 'Setting up your environment and loading your first dataset',
        body: 'In this tutorial, we\'ll guide you through installing PySpark and Dask, verifying your Java environment, and loading your first NYC taxi dataset in Parquet format. By the end, you\'ll have a working distributed computing setup and hands-on experience loading real data.',
        analogy: {
          icon: '🌾',
          text: 'Think of Spark like coordinating a harvest team: instead of one farmer working the entire field alone (which would take forever), you have 100 farmers each working on small patches in parallel. Spark is the foreman coordinating all these workers.'
        },
        concept: 'Lazy evaluation is a key concept in Spark. When you call df.filter(col("amount") > 50), Spark doesn\'t process the data immediately. Instead, it builds a logical plan of what needs to happen. Only when you call an action like .show() or .write() does Spark actually execute the work. This allows Spark to optimize the entire pipeline before running it.',
        steps: [
          {
            n: 1,
            title: 'Install Java and PySpark',
            body: 'First, ensure Java 8 or higher is installed on your system. PySpark requires Java to run the Spark JVM. Then install PySpark via pip: pip install pyspark.'
          },
          {
            n: 2,
            title: 'Install Dask',
            body: 'Install Dask alongside PySpark for comparison: pip install dask[dataframe]. Dask is another distributed computing framework with a pandas-like API.'
          },
          {
            n: 3,
            title: 'Verify your environment',
            body: 'Run the provided check_environment.py script to verify Java, PySpark, and Dask are correctly installed and can find each other.'
          },
          {
            n: 4,
            title: 'Load taxi Parquet in both frameworks',
            body: 'Use both SparkSession and dask.dataframe to load the same NYC taxi Parquet file. Compare execution times and memory usage between the two.'
          }
        ],
        code: `from pyspark.sql import SparkSession
from pyspark.sql.functions import col

# Create a SparkSession
spark = SparkSession.builder \\
    .appName("TaxiAnalysis") \\
    .getOrCreate()

# Load Parquet file
taxi_df = spark.read.parquet("s3://nyc-taxi/data/2023/")

# Lazy transformation (no action yet)
filtered = taxi_df.filter(col("trip_distance") > 5)

# Action: this actually executes the computation
filtered.show(5)`,
        quiz: {
          q: 'What happens when you call df.filter(col("amount") > 50) in Spark?',
          opts: [

def fetch_who_data(max_retries=3):

    for attempt in range(max_retries):
        try:
            resp = requests.get(url, timeout=10)
            resp.raise_for_status()
            data = resp.json()
            df = pd.json_normalize(data)  # Flatten nested JSON
            return df
        except requests.exceptions.RequestException as e:
            wait = 2 ** attempt  # Exponential backoff
            print(f"Attempt {attempt+1} failed, waiting {wait}s...")
            time.sleep(wait)
    raise Exception("WHO API failed after retries")

def benchmark_query(spark, query_func, name, iterations=3):
    times = []

        proc = psutil.Process()
        mem_start = proc.memory_info().rss / 1e9

        start = time.time()
        result = query_func()
        elapsed = time.time() - start

        mem_peak = proc.memory_info().rss / 1e9
        memory_peaks.append(mem_peak - mem_start)

from pyspark.sql import SparkSession
from pyspark.sql.functions import col, when

# Batch view: historical data (yesterday)

# Streaming view: real-time (last 1 hour)
streaming_df = spark.readStream.format("kafka") \\
    .option("kafka.bootstrap.servers", "localhost:9092") \\
    .option("subscribe", "taxi_events") \\
    .load()

# Parse streaming and aggregate
from pyspark.sql.functions import window
streaming_hourly = streaming_df.groupBy(
    window(col("timestamp"), "1 hour")
).count()

# Merge: if event in last 1 hour, use streaming; else use batch
merged = batch_df.union(
    streaming_hourly.select(col("window.start").alias("hour"), col("count"))
).dropDuplicates(["hour"])  # streaming takes precedence

# Kappa pattern: streaming with event replay
# (Use event timestamps to re-aggregate if logic changes)
def kappa_pipeline():
    """Pure streaming pipeline with correction capability."""
    stream = spark.readStream.format("kafka").option("subscribe", "events").load()

    # Include event_timestamp and processing_timestamp
    from pyspark.sql.functions import current_timestamp
    stream = stream.withColumn("processing_time", current_timestamp())

    # Aggregate
    result = stream.groupBy("event_type").count()

    # Write with checkpoint (enables replay)
    query = result.writeStream \\
        .option("checkpointLocation", "ckpt/kappa") \\
        .format("parquet").start()

    return query

import pandas as pd
from typing import List

class QualityGate:
    def __init__(self, name: str, df: pd.DataFrame):
        self.name = name
        self.df = df
        self.checks_passed = 0
        self.checks_failed = 0

    def assert_schema(self, expected_cols: List[str]):
        """Verify DataFrame has exactly these columns."""
        actual = set(self.df.columns)
        expected = set(expected_cols)
        if actual != expected:
            missing = expected - actual
            extra = actual - expected
            raise ValueError(
                f"{self.name}: Schema mismatch. "
                f"Missing: {missing}. Extra: {extra}"
            )
        self.checks_passed += 1

    def assert_no_nulls(self, cols: List[str]):
        """Fail if any of these columns have nulls."""
        nulls = self.df[cols].isnull().sum()
        if nulls.any():
            raise ValueError(
                f"{self.name}: Unexpected nulls in {nulls[nulls > 0].to_dict()}"
            )
        self.checks_passed += 1

    def assert_row_count(self, min_rows: int, max_rows: int = None):
        """Row count must be in range."""
        n = len(self.df)
        if n < min_rows or (max_rows and n > max_rows):
            raise ValueError(
                f"{self.name}: Row count {n} outside range [{min_rows}, {max_rows}]"
            )
        self.checks_passed += 1

    def assert_value_range(self, col: str, min_val, max_val):
        """Column values must be in range."""
        if (self.df[col] < min_val).any() or (self.df[col] > max_val).any():
            raise ValueError(
                f"{self.name}: Column {col} has values outside [{min_val}, {max_val}]"
            )
        self.checks_passed += 1

# Step 3: Modular transforms
def remove_duplicates(df, key_cols: List[str]) -> pd.DataFrame:
    """Remove duplicate rows based on key columns."""
    before = len(df)
    df = df.drop_duplicates(subset=key_cols)
    after = len(df)
    print(f"Removed {before - after} duplicates")
    return df

def fill_nulls(df, fill_strategy: dict) -> pd.DataFrame:
    """Fill nulls per column using strategy (\'mean\', \'forward_fill\', value)."""
    for col, strategy in fill_strategy.items():
        if strategy == "mean":
            df[col] = df[col].fillna(df[col].mean())
        elif strategy == "forward_fill":
            df[col] = df[col].fillna(method="ffill")
        else:
            df[col] = df[col].fillna(strategy)
    return df

def clip_outliers(df, col: str, std_devs: float = 3) -> pd.DataFrame:
    """Clip values > N standard deviations from mean."""
    mean = df[col].mean()
    std = df[col].std()
    lower = mean - std_devs * std
    upper = mean + std_devs * std
    df[col] = df[col].clip(lower=lower, upper=upper)
    return df

    df = fill_nulls(df, fill_strategy={"tip": 0})

    gate_out.assert_value_range("fare", min_val=0, max_val=300)
    gate_out.assert_row_count(min_rows=1)

    return df`,

class BadDataPipeline:
    """Anti-pattern: hardcoded dependencies."""
    def load_data(self):
        # Hardcoded S3 client — cannot test or mock
        import boto3
        s3 = boto3.client("s3")

class GoodDataPipeline:
    """Best practice: dependencies injected."""
    def __init__(self, s3_client, config):

        self.config = config

    def load_data(self):
        bucket = self.config.get("s3.bucket")
        key = self.config.get("data.input_path")
        obj = self.s3_client.get_object(Bucket=bucket, Key=key)
        return obj

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  const phases = {};
  weeks.forEach(week => {
    if (!phases[week.phase]) {
      phases[week.phase] = { name: week.phaseName, weeks: [] };
    }
    phases[week.phase].weeks.push(week);
  });

  Object.keys(phases).sort().forEach(phaseId => {
    const phase = phases[phaseId];
    const phaseGroup = document.createElement('div');
    phaseGroup.className = 'phase-group';
    const header = document.createElement('div');
    header.className = 'phase-header';
    header.innerHTML = `<span>${phase.name}</span><span class="phase-toggle">▼</span>`;
    const weeksList = document.createElement('div');
    weeksList.className = 'phase-weeks';
    phase.weeks.forEach(week => {
      const weekItem = document.createElement('div');
      weekItem.className = 'week-item';
      if (week.id === currentWeek) weekItem.classList.add('active');
      weekItem.textContent = `Week ${week.id}`;
      weekItem.onclick = (e) => { e.stopPropagation(); switchWeek(week.id); };
      weeksList.appendChild(weekItem);
    });
    header.onclick = () => {
      weeksList.classList.toggle('collapsed');
      header.querySelector('.phase-toggle').classList.toggle('collapsed');
    };
    phaseGroup.appendChild(header);
    phaseGroup.appendChild(weeksList);
    sidebar.appendChild(phaseGroup);
  });
}

    <div class="week-meta">
      <div class="week-meta-item"><span class="week-meta-dot"></span><span>Week ${week.id}</span></div>
      <div class="week-meta-item"><span class="week-meta-dot"></span><span>Phase: ${week.phaseName}</span></div>
      <div class="week-meta-item"><span class="week-meta-dot"></span><span>Dataset: ${week.dataset}</span></div>
    </div>
  `;

  const tabsDiv = document.getElementById('tabs');
  tabsDiv.innerHTML = `
    <div class="tabs">
      <button class="tab-button ${currentTab === 'tut' ? 'active tut' : 'tut'}" onclick="switchTab('tut')">Tutorial</button>
      <button class="tab-button ${currentTab === 'howto' ? 'active howto' : 'howto'}" onclick="switchTab('howto')">How-to</button>
      <button class="tab-button ${currentTab === 'expl' ? 'active expl' : 'expl'}" onclick="switchTab('expl')">Explanation</button>
      <button class="tab-button ${currentTab === 'ref' ? 'active ref' : 'ref'}" onclick="switchTab('ref')">Reference</button>
    </div>
  `;

  const contentDiv = document.getElementById('content-area');
  const tabData = week.tabs[currentTab];
  if (!tabData) {
    contentDiv.innerHTML = '<div class="coming-soon"><div class="coming-soon-title">Content coming soon</div><p>This lesson is under development. Check back soon!</p></div>';
  } else {
    contentDiv.innerHTML = renderTabContent(week, tabData, currentTab);
  }

  const markBtn = document.getElementById('mark-complete-btn');
  const isCompleted = completed.has(`${week.id}-${currentTab}`);
  markBtn.textContent = isCompleted ? '✓ Completed' : 'Mark Complete';
  markBtn.classList.toggle('completed', isCompleted);
  markBtn.onclick = () => markDone(week.id, currentTab);
}

function renderTabContent(week, tabData, tabKey) {
  let html = `<div class="tab-content active"><div class="diataxis-banner ${tabKey}">${getDiataxisLabel(tabKey)}: ${tabData.title}</div>`;
  if (tabData.body) html += `<p class="body-text">${tabData.body}</p>`;
  if (tabData.analogy) {
    html += `<div class="analogy-box"><div class="analogy-icon">${tabData.analogy.icon}</div><div class="analogy-text"><div class="analogy-label">Analogy</div><div class="analogy-content">${tabData.analogy.text}</div></div></div>`;
  }
  if (tabData.concept) {
    html += `<div class="concept-box"><div class="concept-label">Key Concept</div><div class="concept-content">${tabData.concept}</div></div>`;
  }
  if (tabData.steps && tabData.steps.length > 0) {
    html += '<div class="section-title">Steps</div><div class="steps">';
    tabData.steps.forEach(step => {
      html += `<div class="step"><div class="step-number">${step.n}</div><div class="step-content"><div class="step-title">${step.title}</div><div class="step-body">${step.body}</div></div></div>`;
    });
    html += '</div>';
  }
  if (tabData.tables && tabData.tables.length > 0) {
    html += '<div class="section-title">Reference</div>';
    tabData.tables.forEach(table => {
      html += `<div class="reference-table"><div class="table-title">${table.title}</div><table><thead><tr>`;
      table.rows[0].forEach(cell => { html += `<th>${cell}</th>`; });
      html += '</tr></thead><tbody>';
      for (let i = 1; i < table.rows.length; i++) {
        html += '<tr>';
        table.rows[i].forEach(cell => { html += `<td>${cell}</td>`; });
        html += '</tr>';
      }
      html += '</tbody></table></div>';
    });
  }
  if (tabData.code) {
    const codeId = `code-${week.id}-${tabKey}`;
    html += `<div class="code-section"><div class="code-label">Code Example</div><div class="code-wrapper"><button class="code-copy-btn" onclick="copyCode('${codeId}', this)">Copy</button><pre><code id="${codeId}">${escapeHtml(tabData.code)}</code></pre></div></div>`;
  }
  if (tabData.quiz) {
    const quizId = `quiz-${week.id}-${tabKey}`;
    html += `<div class="quiz-section"><div class="quiz-question">${tabData.quiz.q}</div><div class="quiz-options">`;
    tabData.quiz.opts.forEach((opt, i) => {
      html += `<label class="quiz-option"><input type="radio" name="${quizId}" value="${i}" onchange="answer(${week.id}, '${tabKey}', ${i}, ${tabData.quiz.correct})"><span>${opt}</span></label>`;
    });
    html += `</div><div class="quiz-feedback" id="${quizId}-feedback"></div></div>`;
  }
  html += '</div>';
  return html;
}

function getDiataxisLabel(tabKey) {
  const labels = { tut: 'Tutorial', howto: 'How-to', expl: 'Explanation', ref: 'Reference' };
  return labels[tabKey] || '';
}

function markDone(weekId, tabKey) {
  const key = `${weekId}-${tabKey}`;
  if (completed.has(key)) completed.delete(key);
  else completed.add(key);
  updateProgress();
  renderContent();
}

function answer(weekId, tabKey, chosen, correct) {
  const quizId = `quiz-${weekId}-${tabKey}`;
  const feedback = document.getElementById(`${quizId}-feedback`);
  const isCorrect = chosen === correct;
  if (isCorrect) {
    feedback.textContent = '✓ ' + weeks.find(w => w.id === weekId).tabs[tabKey].quiz.feedback;
    feedback.className = 'quiz-feedback shown correct';
  } else {
    feedback.textContent = '✗ Incorrect. ' + weeks.find(w => w.id === weekId).tabs[tabKey].quiz.feedback;
    feedback.className = 'quiz-feedback shown incorrect';
  }
}

function copyCode(id, btn) {
  const code = document.getElementById(id).textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function updateProgress() {
  const total = 48;
  const count = completed.size;
  const percent = (count / total) * 100;
  document.getElementById('progress-text').textContent = `${count} / ${total}`;
  document.querySelector('.progress-fill').style.width = `${percent}%`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar();
  renderContent();
  updateProgress();
});
</script>

</body>
</html>
